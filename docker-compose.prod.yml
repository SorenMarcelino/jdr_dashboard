# Stack de production pour le VPS. À lancer de façon autonome :
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Différences avec docker-compose.yml (dev) :
# - Pas de binding de ports sur backend/frontend : ils ne sont joignables que
#   sur le réseau docker. Caddy est le seul point d'entrée internet.
# - Caddy termine le TLS via Let's Encrypt pour $SITE_HOSTNAME (défini dans .env).
# - NODE_ENV=production (cookies secure, pas de seeds, messages d'erreur masqués).
# - La base est MongoDB Atlas (MONGODB_URI dans .env), pas un conteneur local.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 5050
      CORS_ORIGIN: https://${SITE_HOSTNAME}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Same-origin en prod : URLs relatives.
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_SOCKET_URL: ""
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_HOSTNAME: ${SITE_HOSTNAME}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
