# Stack de production pour le VPS. À lancer de façon autonome :
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Différences avec docker-compose.yml (dev) :
# - Pas de binding de ports sur backend/frontend : ils ne sont joignables que
#   sur le réseau docker. Caddy est le seul point d'entrée internet.
# - Pas de service caddy ici : le Caddy de TelemetryAdvisor fait office de
#   reverse-proxy partagé via le réseau proxy_net (créer avec :
#   docker network create proxy_net).
# - NODE_ENV=production (cookies secure, pas de seeds, messages d'erreur masqués).
# - La base est MongoDB Atlas (MONGODB_URI dans .env), pas un conteneur local.

services:
  backend:
    container_name: jdr-backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 5050
      CORS_ORIGIN: https://${SITE_HOSTNAME}
    networks:
      - default
      - proxy_net
    restart: unless-stopped

  frontend:
    container_name: jdr-frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Same-origin en prod : URLs relatives.
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_SOCKET_URL: ""
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - default
      - proxy_net
    restart: unless-stopped

networks:
  proxy_net:
    external: true
