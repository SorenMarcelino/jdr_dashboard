services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: jdr_dashboard

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5050:5050"
    depends_on:
      - mongodb
    environment:
      NODE_ENV: development
      PORT: 5050
      MONGODB_URI: mongodb://mongodb:27017/jdr_dashboard
      TOKEN_KEY: ${TOKEN_KEY:-change_me_secret_key}
      REFRESH_TOKEN_KEY: ${REFRESH_TOKEN_KEY:-change_me_refresh_secret_key}
      CORS_ORIGIN: http://localhost:3000

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # En dev (pas de Caddy), frontend et backend sont sur des origines
        # distinctes : on cible explicitement le backend. En prod, ces args
        # sont vides (same-origin via Caddy) — cf. docker-compose.prod.yml.
        NEXT_PUBLIC_API_URL: http://localhost:5050
        NEXT_PUBLIC_SOCKET_URL: http://localhost:5050
    environment:
      # Le build standalone tourne en NODE_ENV=production : la CSP par défaut
      # est same-origin. Comme le backend est ici sur une autre origine, on
      # autorise explicitement ses origines HTTP + WebSocket (lu au runtime
      # par src/middleware.ts).
      EXTRA_CONNECT_SRC: "http://localhost:5050 ws://localhost:5050"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:
