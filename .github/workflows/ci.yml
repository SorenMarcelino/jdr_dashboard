name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit (production deps)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (no DB required)
        run: npm run test:unit

      - name: Build (Next.js)
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

# Note : `npm run test:unit` (tests unitaires, sans DB) tourne en CI.
# `npm test` regroupe les tests d'intégration qui nécessitent une base MongoDB
# et des secrets (.env.test) ; ils se lancent manuellement en local.
